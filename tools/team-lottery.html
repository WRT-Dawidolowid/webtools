<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Losowanie składów</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Outfit", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    margin: 0;
    padding: 10px;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* NOWE STYLE - PASEK GÓRNY I PRZYCISK POWROTU */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back-btn {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-family: "Outfit", sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: 2px solid rgba(255,255,255,0.3);
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(0, 0, 0, 0.5);
    border-color: rgba(255,255,255,0.6);
    transform: translateY(-2px);
}

h1 {
    font-weight: 700;
    font-size: 1.8em;
    margin-bottom: 20px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.language-selector select {
    padding: 10px 15px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-family: "Outfit", sans-serif;
    font-size: 14px;
    cursor: pointer;
    outline: none;
}

.language-selector select option {
    background: #4a4a4a;
    color: white;
}

.input-section {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: flex-start;
}

textarea {
    flex: 1;
    min-width: 200px;
    height: 120px;
    padding: 15px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    outline: none;
    font-size: 16px;
    font-family: "Outfit", sans-serif;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    resize: none;
    transition: 0.3s;
    box-sizing: border-box;
}

textarea:focus {
    border-color: rgba(255,255,255,0.6);
    background: rgba(0, 0, 0, 0.4);
}

.players-skills {
    flex: 1;
    min-width: 250px;
    background: rgba(0, 0, 0, 0.2);
    padding: 15px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    max-height: 120px;
    overflow-y: auto;
}

.player-skill-input {
    display: flex;
    gap: 10px;
    align-items: center;
    margin: 8px 0;
    background: rgba(0, 0, 0, 0.2);
    padding: 8px;
    border-radius: 8px;
}

.player-skill-input input[type="text"] {
    flex: 1;
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    font-family: "Outfit", sans-serif;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 13px;
}

.player-skill-input input[type="text"]::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.player-skill-input input[type="range"] {
    width: 80px;
    cursor: pointer;
    accent-color: #ffd89b;
}

.player-skill-value {
    font-size: 12px;
    font-weight: 600;
    min-width: 30px;
}

button {
    margin-top: 20px;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    font-family: "Outfit", sans-serif;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.teams {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
}

.team {
    background: rgba(255, 255, 255, 0.15);
    padding: 25px;
    border-radius: 16px;
    min-width: 250px;
    flex: 1;
    max-width: 280px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.team h2 {
    margin-top: 0;
    font-size: 1.3em;
    margin-bottom: 15px;
}

.player {
    background: rgba(255, 255, 255, 0.1);
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    font-weight: 500;
    word-break: break-word;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.player-skill {
    font-size: 12px;
    opacity: 0.8;
}

@media (max-width: 600px) {
    .container {
        padding: 15px;
    }
    
    /* MOBILE FIX DLA PASKA GÓRNEGO */
    .top-bar {
        flex-direction: column;
        gap: 15px;
    }

    .back-btn, .language-selector, .language-selector select {
        width: 100%;
        box-sizing: border-box;
        justify-content: center;
    }
    
    h1 {
        font-size: 1.5em;
        margin-bottom: 15px;
    }
    
    .input-section {
        flex-direction: column;
        align-items: stretch;
    }
    
    textarea {
        height: 150px;
        font-size: 14px;
    }
    
    .players-skills {
        flex: 1;
        max-height: 200px;
    }
    
    button {
        width: 100%;
        padding: 12px 20px;
        font-size: 14px;
    }
    
    .teams {
        gap: 15px;
    }
    
    .team {
        width: 100%;
        max-width: 100%;
        padding: 20px;
    }
    
    .team h2 {
        font-size: 1.1em;
    }
    
    .player {
        padding: 10px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="container">
    <!-- DODANY PASEK GÓRNY (Przycisk Back + Język) -->
    <div class="top-bar">
        <a href="/webtools/" class="back-btn" id="backBtn">⬅️ Wróć</a>
        
        <div class="language-selector">
            <select id="language" onchange="changeLanguage()">
                <option value="pl">Polski</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
            </select>
        </div>
    </div>

    <h1 id="title">🏀 Losowanie składów</h1>

    <div class="input-section">
        <textarea id="players" placeholder="Wpisz zawodników (każdy w nowej linii)">Dawid
Bartek
Michał
Karol
Maciek
Piotrek</textarea>
        
        <div class="players-skills" id="playersSkills"></div>
    </div>

    <br>
    <button onclick="drawTeams()" id="drawBtn">Losuj składy</button>

    <div class="teams">
        <div class="team">
            <h2 id="teamATitle">Drużyna A</h2>
            <div id="teamA"></div>
        </div>

        <div class="team">
            <h2 id="teamBTitle">Drużyna B</h2>
            <div id="teamB"></div>
        </div>
    </div>
</div>

<script>
const translations = {
    pl: {
        title: "🏀 Losowanie składów",
        drawBtn: "Losuj składy",
        teamA: "Drużyna A",
        teamB: "Drużyna B",
        exportBtn: "Eksportuj preset",
        importBtn: "Importuj preset",
        savePreset: "Zapisz preset",
        backBtn: "⬅️ Wróć"
    },
    en: {
        title: "🏀 Team Lottery",
        drawBtn: "Draw Teams",
        teamA: "Team A",
        teamB: "Team B",
        exportBtn: "Export preset",
        importBtn: "Import preset",
        savePreset: "Save preset",
        backBtn: "⬅️ Back"
    },
    es: {
        title: "🏀 Sorteo de Equipos",
        drawBtn: "Sortear Equipos",
        teamA: "Equipo A",
        teamB: "Equipo B",
        exportBtn: "Exportar preset",
        importBtn: "Importar preset",
        savePreset: "Guardar preset",
        backBtn: "⬅️ Volver"
    },
    fr: {
        title: "🏀 Tirage au Sort",
        drawBtn: "Tirer les Équipes",
        teamA: "Équipe A",
        teamB: "Équipe B",
        exportBtn: "Exporter preset",
        importBtn: "Importer preset",
        savePreset: "Enregistrer preset",
        backBtn: "⬅️ Retour"
    },
    de: {
        title: "🏀 Mannschaftsauslosung",
        drawBtn: "Teams Auslosen",
        teamA: "Team A",
        teamB: "Team B",
        exportBtn: "Preset exportieren",
        importBtn: "Preset importieren",
        savePreset: "Preset speichern",
        backBtn: "⬅️ Zurück"
    }
};

document.getElementById("players").addEventListener("input", updatePlayerSkills);

function updatePlayerSkills() {
    const lang = document.getElementById("language").value;
    
    let players = document.getElementById("players").value
        .split("\n")
        .map(p => p.trim())
        .filter(p => p !== "");

    let skillsHtml = players.map((p, i) => `
        <div class="player-skill-input">
            <input type="text" value="${p}" readonly style="flex: 1;">
            <input type="range" data-player="${i}" min="0" max="100" value="50" onchange="updateSkillValue(this)">
            <div class="player-skill-value" data-value="${i}">50</div>
        </div>
    `).join("");

    // Dynamiczne pobieranie tłumaczeń dla przycisków
    skillsHtml += `
        <button id="exportBtn" onclick="exportPreset()" style="width: 100%; margin-top: 10px; padding: 8px; font-size: 12px;">${translations[lang].exportBtn}</button>
        <button id="importBtn" onclick="importPreset()" style="width: 100%; margin-top: 5px; padding: 8px; font-size: 12px;">${translations[lang].importBtn}</button>
    `;

    document.getElementById("playersSkills").innerHTML = skillsHtml;
}

function updateSkillValue(slider) {
    const valueDiv = slider.parentElement.querySelector(".player-skill-value");
    valueDiv.textContent = slider.value;
}

function changeLanguage() {
    const lang = document.getElementById("language").value;
    document.getElementById("title").textContent = translations[lang].title;
    document.getElementById("drawBtn").textContent = translations[lang].drawBtn;
    document.getElementById("teamATitle").textContent = translations[lang].teamA;
    document.getElementById("teamBTitle").textContent = translations[lang].teamB;
    document.getElementById("backBtn").textContent = translations[lang].backBtn; // Tłumaczenie przycisku powrotu
    
    // Tłumaczenie przycisków Import/Export jeśli istnieją
    const exportBtn = document.getElementById("exportBtn");
    const importBtn = document.getElementById("importBtn");
    if (exportBtn) exportBtn.textContent = translations[lang].exportBtn;
    if (importBtn) importBtn.textContent = translations[lang].importBtn;
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function drawTeams() {
    let players = document.getElementById("players").value
        .split("\n")
        .map(p => p.trim())
        .filter(p => p !== "");

    let playersWithSkill = players.map((p, i) => {
        const slider = document.querySelector(`input[data-player="${i}"]`);
        const skill = slider ? parseInt(slider.value) : 50;
        return { name: p, skill: skill };
    });

    // Sortuj po umiejętności i losuj
    playersWithSkill.sort((a, b) => b.skill - a.skill);
    shuffle(playersWithSkill);

    let teamA = [];
    let teamB = [];

    playersWithSkill.forEach((p, i) => {
        if (i % 2 === 0) teamA.push(p);
        else teamB.push(p);
    });

    document.getElementById("teamA").innerHTML =
        teamA.map(p => `<div class="player"><span>${p.name}</span><span class="player-skill">${p.skill}</span></div>`).join("");

    document.getElementById("teamB").innerHTML =
        teamB.map(p => `<div class="player"><span>${p.name}</span><span class="player-skill">${p.skill}</span></div>`).join("");
}

function exportPreset() {
    let players = document.getElementById("players").value
        .split("\n")
        .map(p => p.trim())
        .filter(p => p !== "");

    let preset = players.map((p, i) => {
        const slider = document.querySelector(`input[data-player="${i}"]`);
        const skill = slider ? slider.value : 50;
        return { name: p, skill: skill };
    });

    const json = JSON.stringify(preset, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "skills_preset.json";
    a.click();
    URL.revokeObjectURL(url);
}

function importPreset() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const preset = JSON.parse(event.target.result);
                preset.forEach((p, i) => {
                    const slider = document.querySelector(`input[data-player="${i}"]`);
                    if (slider) slider.value = p.skill;
                });
                document.querySelectorAll(".player-skill-value").forEach((el, i) => {
                    el.textContent = preset[i]?.skill || 50;
                });
            } catch (err) {
                alert("Błąd przy wczytywaniu presetu!");
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

updatePlayerSkills();
</script>

</body>
</html>
